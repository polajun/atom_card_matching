<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바로 사용하는 페이지</title>
    <style>
        /* 기본 스타일 초기화 및 레이아웃 설정 */
        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #4A90E2;
            margin-bottom: 20px;
            font-size: 24px;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #666;
        }

        /* 인터랙티브 버튼 스타일 */
        .btn {
            background-color: #4A90E2;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        .btn:hover {
            background-color: #357ABD;
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* 결과 메시지 스타일 */
        #result {
            margin-top: 20px;
            font-weight: bold;
            color: #2ecc71;
            min-height: 24px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>HTML 준비 완료!</h1>
        <p>이 파일은 즉시 사용이 가능한 완전한 형태의 HTML 템플릿입니다. 필요에 따라 텍스트나 기능을 수정하여 사용하세요.</p>
        
        <!-- 작동 확인용 버튼 -->
        <button class="btn" onclick="sayHello()">버튼 클릭해보기</button>
        <div id="result"></div>
    </div>

    <script>
        // 간단한 작동 확인용 자바스크립트 함수
        function sayHello() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerText = "반갑습니다! 정상적으로 작동하고 있습니다.";
        }
    </script>

</body>
</html>
